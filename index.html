<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://accounts.google.com https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.googleapis.com https://accounts.google.com https://oauth2.googleapis.com; frame-src https://accounts.google.com https://content.googleapis.com; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'" />
    <meta name="theme-color" content="#0e4a40" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Foco GeriClass" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Foco GeriClass</title>
    <script>
      // Aplica o tema salvo antes da pintura (evita flash). Padrão: claro.
      try {
        if (localStorage.getItem('tempo_theme') === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <script>
      // Marca iPhone/iPad para aplicar o visual "Liquid Glass" do iOS.
      try {
        var ua = navigator.userAgent || '';
        if (/iphone|ipad|ipod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
          document.documentElement.classList.add('ios');
        }
      } catch (e) {}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f8fafc; }
      /* Fonte "display" para títulos/manchetes */
      .font-display { font-family: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }

      /* ===== Tema escuro (aplicado via classe .dark no <html>) ===== */
      html.dark body { background-color: #0f172a; color: #e2e8f0; }

      /* Superfícies */
      html.dark .bg-white { background-color: #1e293b; }
      html.dark .bg-white\/90 { background-color: rgba(30,41,59,0.9); }
      html.dark .bg-white\/60 { background-color: rgba(30,41,59,0.6); }
      html.dark .bg-slate-50 { background-color: #0f172a; }
      html.dark .bg-slate-50\/60 { background-color: rgba(15,23,42,0.6); }
      html.dark .bg-slate-50\/50 { background-color: rgba(15,23,42,0.5); }
      html.dark .bg-slate-100 { background-color: #334155; }
      html.dark .bg-slate-200 { background-color: #475569; }

      /* Texto */
      html.dark .text-slate-800 { color: #f1f5f9; }
      html.dark .text-slate-700 { color: #e2e8f0; }
      html.dark .text-slate-600 { color: #cbd5e1; }
      html.dark .text-slate-500 { color: #94a3b8; }
      html.dark .text-slate-400 { color: #94a3b8; }
      html.dark .text-slate-300 { color: #64748b; }

      /* Bordas */
      html.dark .border-slate-100 { border-color: #334155; }
      html.dark .border-slate-200 { border-color: #334155; }
      html.dark .border-slate-300 { border-color: #475569; }

      /* Chips coloridos: pastel claro -> tinta translúcida */
      html.dark .bg-teal-50 { background-color: rgba(20,184,166,0.16); }
      html.dark .bg-teal-50\/40 { background-color: rgba(20,184,166,0.10); }
      html.dark .bg-rose-50 { background-color: rgba(244,63,94,0.16); }
      html.dark .bg-emerald-50 { background-color: rgba(16,185,129,0.16); }
      html.dark .bg-sky-50 { background-color: rgba(56,189,248,0.16); }
      html.dark .bg-orange-50 { background-color: rgba(249,115,22,0.16); }

      /* Texto colorido clareado */
      html.dark .text-teal-800 { color: #99f6e4; }
      html.dark .text-teal-700 { color: #5eead4; }
      html.dark .text-teal-600, html.dark .text-teal-500 { color: #2dd4bf; }
      html.dark .text-rose-600, html.dark .text-rose-500 { color: #fb7185; }
      html.dark .text-emerald-700 { color: #6ee7b7; }
      html.dark .text-emerald-600, html.dark .text-emerald-500 { color: #34d399; }
      html.dark .text-sky-600 { color: #38bdf8; }
      html.dark .text-orange-600, html.dark .text-orange-500 { color: #fb923c; }

      /* Bordas coloridas */
      html.dark .border-teal-100 { border-color: rgba(20,184,166,0.25); }
      html.dark .border-teal-300 { border-color: rgba(20,184,166,0.45); }
      html.dark .border-rose-200 { border-color: rgba(244,63,94,0.30); }
      html.dark .border-rose-300 { border-color: rgba(244,63,94,0.45); }
      html.dark .border-emerald-50 { border-color: rgba(16,185,129,0.20); }
      html.dark .border-emerald-200 { border-color: rgba(16,185,129,0.35); }

      /* Matriz de Eisenhower e selos (definidos em types.ts: fundos -50/50, -100 e âmbar) */
      html.dark .bg-rose-50\/50 { background-color: rgba(244,63,94,0.10); }
      html.dark .bg-teal-50\/50 { background-color: rgba(20,184,166,0.10); }
      html.dark .bg-amber-50\/50 { background-color: rgba(245,158,11,0.10); }
      html.dark .bg-rose-100 { background-color: rgba(244,63,94,0.22); }
      html.dark .bg-teal-100 { background-color: rgba(20,184,166,0.22); }
      html.dark .bg-amber-100 { background-color: rgba(245,158,11,0.22); }
      html.dark .text-rose-700 { color: #fda4af; }
      html.dark .text-amber-700 { color: #fcd34d; }
      html.dark .border-teal-200 { border-color: rgba(20,184,166,0.30); }
      html.dark .border-amber-200 { border-color: rgba(245,158,11,0.30); }

      /* Hover (fundos) */
      html.dark .hover\:bg-slate-50:hover { background-color: rgba(148,163,184,0.10); }
      html.dark .hover\:bg-slate-100:hover { background-color: rgba(148,163,184,0.16); }
      html.dark .hover\:bg-slate-200:hover { background-color: rgba(148,163,184,0.22); }
      html.dark .hover\:bg-teal-50:hover { background-color: rgba(20,184,166,0.16); }
      html.dark .hover\:bg-teal-50\/40:hover { background-color: rgba(20,184,166,0.10); }
      html.dark .hover\:bg-rose-50:hover { background-color: rgba(244,63,94,0.16); }
      html.dark .hover\:bg-emerald-50:hover { background-color: rgba(16,185,129,0.16); }

      /* Hover (texto) */
      html.dark .hover\:text-slate-700:hover { color: #e2e8f0; }
      html.dark .hover\:text-slate-600:hover { color: #cbd5e1; }
      html.dark .hover\:text-teal-600:hover { color: #2dd4bf; }
      html.dark .hover\:text-rose-600:hover { color: #fb7185; }
      html.dark .hover\:text-emerald-600:hover { color: #34d399; }

      /* Campos de formulário */
      html.dark input, html.dark textarea, html.dark select {
        background-color: #0f172a;
        color: #f1f5f9;
        border-color: #334155;
        color-scheme: dark;
      }
      html.dark input::placeholder, html.dark textarea::placeholder { color: #64748b; }
      /* ===== Animações de feedback (celebração + toast) ===== */
      @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.35); } 100% { transform: scale(1); } }
      .animate-pop { animation: pop 0.32s ease; }
      @keyframes confetti-fall {
        0% { opacity: 1; transform: translate3d(0, 0, 0) rotate(0deg); }
        100% { opacity: 0; transform: translate3d(var(--drift, 0), 100vh, 0) rotate(720deg); }
      }
      @keyframes toast-in {
        0% { opacity: 0; transform: translateY(12px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .animate-float { animation: float 3s ease-in-out infinite; }
      @keyframes fab-in { 0% { opacity: 0; transform: translateY(8px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
      @media (prefers-reduced-motion: reduce) { .animate-float { animation: none; } }

      /* Evita o zoom automático do iOS ao focar campos (acontece quando a fonte < 16px).
         Vale só em telas de toque, preservando o visual compacto no desktop. */
      @media (pointer: coarse) {
        input:not([type="checkbox"]):not([type="radio"]),
        select,
        textarea { font-size: 16px !important; }
      }

      /* ===== Look "Liquid Glass" do iOS (somente iPhone/iPad: html.ios) ===== */
      html.ios .header-glass {
        background-color: rgba(255, 255, 255, 0.42) !important;
        -webkit-backdrop-filter: saturate(180%) blur(22px) !important;
        backdrop-filter: saturate(180%) blur(22px) !important;
        padding-top: max(0.75rem, env(safe-area-inset-top));
      }
      html.dark.ios .header-glass { background-color: rgba(15, 23, 42, 0.42) !important; }

      html.ios .tabbar-glass {
        background-color: rgba(255, 255, 255, 0.06) !important;
        -webkit-backdrop-filter: saturate(200%) blur(34px) !important;
        backdrop-filter: saturate(200%) blur(34px) !important;
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 12px 32px rgba(15, 23, 42, 0.2);
        border-radius: 28px;
        left: 0.75rem;
        right: 0.75rem;
        bottom: calc(env(safe-area-inset-bottom) + 0.5rem);
        padding-bottom: 0;
        overflow: hidden;
      }
      html.dark.ios .tabbar-glass {
        background-color: rgba(17, 24, 39, 0.12) !important;
        border-color: rgba(148, 163, 184, 0.22);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 12px 32px rgba(0, 0, 0, 0.5);
      }

      /* Sobe o botão "+" no iOS para não encostar na barra flutuante */
      html.ios .create-fab { bottom: calc(env(safe-area-inset-bottom) + 6rem); }

      /* Barra de abas bem translúcida: escurece os ícones inativos no claro p/ legibilidade */
      html.ios:not(.dark) .tabbar-glass .text-slate-400 { color: #334155; }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
